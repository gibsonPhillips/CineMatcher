<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMatcher</title>
  <link rel="stylesheet" href="styles/index.css">
</head>

<body>

  <div style="text-align:center; margin-bottom: 20px;">
    <h1 style="color:var(--need); margin:0;">CineMatcher</h1>
    <p style="color:#aaa; margin:5px 0 0 0;">Idk, what do you wanna watch?</p>
  </div>

  <div class="container">
    <!-- Left Column: Voting Panel -->
    <div class="panel">
      <h2>Rate Current Movie</h2>
      <div class="movie-card" id="movieCard">
        <p>Loading collaborative session...</p>
      </div>
      <div class="tier-buttons">
        <button class="btn btn-need" onclick="submitVote('need')">🔥 Need to Watch</button>
        <button class="btn btn-could" onclick="submitVote('could')">👍 Could Watch</button>
        <button class="btn btn-wont" onclick="submitVote('wont')">❌ Won't Watch</button>
        <button class="btn btn-skip" onclick="skipVote('skip')">⏭️ Skip / Indifferent</button>
      </div>
    </div>


    <div class="panel">
      <div class="share-box" id="shareArea">
        <strong>Room Code Link:</strong><br>
        <span id="roomLink" style="color: #ffa502; font-size: 14px;">Generating link...</span>
        <div id="controls">
          <button class="btn btn-reset">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
              <path
                d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z" />
            </svg>
          </button>
          <div class="number-combobox">
            <label for="quantity-choice">Select or type a quantity (Steps of 5):</label>
            <input type="number" id="quantity-choice" name="quantity" list="quantity-list" min="0" max="100" step="5"
              placeholder="0" />

            <datalist id="quantity-list">
              <option value="5"></option>
              <option value="10"></option>
              <option value="25"></option>
              <option value="50"></option>
              <option value="100"></option>
            </datalist>
          </div> <button class="btn btn-custom">make custom list</button>
          <button class="btn btn-full-skip">skip voting and go straight to results</button>
          <button class="btn btn-nick">your nickname</button>
          <button class="btn btn-adult">adult movies allowed?</button>
          <slider>year range double ended</slider>
          <slider>ratings range</slider>
          <button class="btn">support projects like this</button>
        </div>
      </div>

    </div>

    <div class="panel" style="grid-column: span 2">
      <div id="leaderboard">
        <p style="color:#aaa; font-style:italic;">Waiting for user input...</p>
      </div>

    </div>
  </div>


  <!-- includes Firebase JavaScript SDK CDNs -->
  <script type="module" src="scripts/index.js"></script>
</body>

</html>
